services:
  postgres:
    image: postgres:16-alpine
    container_name: routing-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: asterisk_routing
      POSTGRES_USER: routing_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-routing_secret_2024}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U routing_user -d asterisk_routing"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: routing-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6382:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: routing-backend
    restart: unless-stopped
    ports:
      - "8002:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://routing_user:${DB_PASSWORD:-routing_secret_2024}@postgres:5432/asterisk_routing
      REDIS_URL: redis://redis:6379/0
      ASTERISK_HOST: ${ASTERISK_HOST:-127.0.0.1}
      ASTERISK_PORT: ${ASTERISK_PORT:-5038}
      AMI_USERNAME: ${AMI_USERNAME:-admin}
      AMI_PASSWORD: ${AMI_PASSWORD:-admin123}
      POLL_INTERVAL: 5
      AGENT_STATUS_TTL: 60
    env_file:
      - backend/app/.env
    volumes:
      - ./ami-watcher:/app/ami-watcher
      - ./backend/app:/app/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: routing-frontend
    restart: unless-stopped
    ports:
      - "3002:3000"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: routing-nginx
    restart: unless-stopped
    ports:
      - "83:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  redis_data:
